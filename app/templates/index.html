<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Estoque do Tio - Admin</title>
    <style>
        body { font-family: sans-serif; max-width: 800px; margin: auto; padding: 20px; background: #f4f4f4; }
        .card { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); margin-bottom: 20px; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
        th { background-color: #f2f2f2; }
        .btn { padding: 5px 10px; cursor: pointer; border: none; border-radius: 4px; }
        .btn-add { background: #28a745; color: white; }
        .btn-del { background: #dc3545; color: white; }
        input[type="text"], input[type="number"] { padding: 8px; margin: 5px 0; width: 100%; box-sizing: border-box; }
    </style>
</head>
<body>

    <h2>📦 Controle de Estoque</h2>

    <!-- Seção de Upload -->
    <div class="card">
        <h3>📷 Ler Nota Fiscal (IA)</h3>
        <input type="file" id="fotoNota" accept="image/*">
        <button class="btn btn-add" onclick="uploadFoto()">Processar com IA</button>
        <p id="statusIa"></p>
    </div>

    <!-- Cadastro Manual / CRUD -->
    <div class="card">
        <h3>➕ Adicionar/Atualizar Manual</h3>
        <input type="text" id="nome" placeholder="Nome do Produto">
        <input type="number" id="qtd" placeholder="Quantidade">
        <input type="number" id="preco" placeholder="Preço Unitário">
        <button class="btn btn-add" onclick="salvarProduto()">Salvar no Banco</button>
    </div>

    <!-- Tabela de Dados -->
    <div class="card">
        <h3>📋 Produtos no Sistema</h3>
        <button onclick="carregarProdutos()">🔄 Atualizar Lista</button>
        <table id="tabelaProdutos">
            <thead>
                <tr>
                    <th>Nome</th>
                    <th>Qtd</th>
                    <th>Preço</th>
                    <th>Ações</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>

    <script>
        const API_URL = window.location.origin;

        async function carregarProdutos() {
            try {
                console.log("Carregando produtos de:", `${API_URL}/produtos`);
                const res = await fetch(`${API_URL}/produtos`);
                if (!res.ok) {
                    console.error("Erro na resposta:", res.status, res.statusText);
                    return;
                }
                const data = await res.json();
                console.log("Produtos recebidos:", data);
                const tbody = document.querySelector("#tabelaProdutos tbody");
                tbody.innerHTML = "";
                
                if (!data || data.length === 0) {
                    tbody.innerHTML = "<tr><td colspan='4'>Nenhum produto encontrado</td></tr>";
                    return;
                }
                
                data.forEach(p => {
                    const nome = p.nome ?? p.name ?? "-";
                    const quantidade = p.quantidade ?? p.quantity ?? 0;
                    const precoValor = p.preco ?? p.price ?? 0;
                    const preco = Number(precoValor) || 0;
                    tbody.innerHTML += `
                        <tr>
                            <td>${nome}</td>
                            <td>${quantidade}</td>
                            <td>R$ ${preco.toFixed(2)}</td>
                            <td><button class="btn btn-del" onclick="vender('${nome}')">Baixa -1</button></td>
                        </tr>
                    `;
                });
            } catch (error) {
                console.error("Erro ao carregar produtos:", error);
                alert("Erro ao carregar produtos: " + error.message);
            }
        }

        async function salvarProduto() {
            const payload = {
                nome: document.getElementById('nome').value,
                quantidade: parseInt(document.getElementById('qtd').value),
                preco: parseFloat(document.getElementById('preco').value)
            };
            await fetch(`${API_URL}/produtos`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(payload)
            });
            carregarProdutos();
        }

        async function uploadFoto() {
            const fileInput = document.getElementById('fotoNota');
            if (fileInput.files.length === 0) return alert("Selecione uma foto");
            
            document.getElementById('statusIa').innerText = "Processando... Isso pode levar 30s na CPU.";
            
            const formData = new FormData();
            formData.append("file", fileInput.files[0]);

            const res = await fetch(`${API_URL}/upload-nota`, {
                method: 'POST',
                body: formData
            });
            const result = await res.json();
            document.getElementById('statusIa').innerText = "Finalizado!";
            carregarProdutos();
        }

        async function vender(nome) {
            await fetch(`${API_URL}/venda?nome=${nome}&qtd_venda=1`, { method: 'POST' });
            carregarProdutos();
        }

        carregarProdutos(); // Carrega ao abrir a página
    </script>
</body>
</html>
